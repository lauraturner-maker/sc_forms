<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<meta name="widget-name" content="Safety Forms">
<meta name="widget-description" content="Complete and submit site safety inspection forms">
<meta name="widget-tags" content="Safety, Forms">
<title>Safety Forms</title>
<style>
:root {
    --primary: var(--sb-brand, #2563eb);
    --success: #10b981;
    --warning: #f59e0b;
    --danger: #ef4444;
    --text: #1f2937;
    --text-light: #6b7280;
    --bg: #ffffff;
    --bg-gray: #f9fafb;
    --border: #e5e7eb;
    --risk-good: #10b981;
    --risk-low: #3b82f6;
    --risk-medium: #f59e0b;
    --risk-high: #ef4444;
}
@media (prefers-color-scheme: dark) {
    :root {
        --primary: var(--sb-brand, #3b9eff);
        --success: #34d399;
        --warning: #fbbf24;
        --danger: #f87171;
        --text: #f3f4f6;
        --text-light: #9ca3af;
        --bg: #1f2937;
        --bg-gray: #111827;
        --border: #374151;
    }
}
* { box-sizing: border-box; margin: 0; padding: 0; }
body {
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
    background: var(--bg);
    color: var(--text);
    -webkit-font-smoothing: antialiased;
}
.widget { width: 100%; max-width: 620px; margin: 0 auto; padding: 16px; }

/* Header */
.cw-header { display: flex; align-items: center; gap: 12px; margin-bottom: 20px; }
.cw-back-btn { background: none; border: none; color: var(--primary); cursor: pointer; font-size: 22px; padding: 4px 8px; line-height: 1; border-radius: 6px; }
.cw-back-btn:hover { background: var(--bg-gray); }
.cw-header h2 { font-size: 17px; font-weight: 700; flex: 1; }
.form-badge { font-size: 11px; color: var(--text-light); background: var(--bg-gray); padding: 3px 9px; border-radius: 12px; border: 1px solid var(--border); white-space: nowrap; }

/* Home screen */
.home-title { font-size: 20px; font-weight: 700; margin-bottom: 14px; }
.search-wrap { position: relative; margin-bottom: 12px; }
.search-icon { position: absolute; left: 12px; top: 50%; transform: translateY(-50%); font-size: 15px; pointer-events: none; }
.search-input {
    width: 100%; padding: 10px 12px 10px 36px;
    border: 1.5px solid var(--border); border-radius: 10px;
    font-size: 14px; font-family: inherit;
    background: var(--bg); color: var(--text);
    outline: none; transition: border-color 0.15s;
}
.search-input:focus { border-color: var(--primary); }
.cat-pills { display: flex; flex-wrap: wrap; gap: 6px; margin-bottom: 16px; }
.cat-pill {
    padding: 5px 13px; border-radius: 20px; font-size: 12px; font-weight: 600;
    border: 1.5px solid var(--border); background: var(--bg); color: var(--text-light);
    cursor: pointer; transition: all 0.12s; white-space: nowrap;
}
.cat-pill:hover { border-color: var(--primary); color: var(--primary); }
.cat-pill.active { background: var(--primary); border-color: var(--primary); color: #fff; }
.form-list { display: flex; flex-direction: column; gap: 8px; }
.form-row {
    display: flex; align-items: center; gap: 12px;
    padding: 13px 14px; border: 1.5px solid var(--border);
    border-radius: 11px; cursor: pointer; background: var(--bg);
    transition: border-color 0.13s, box-shadow 0.13s;
}
.form-row:hover { border-color: var(--primary); box-shadow: 0 0 0 3px rgba(37,99,235,0.07); }
.fr-icon { font-size: 22px; flex-shrink: 0; width: 36px; text-align: center; }
.fr-body { flex: 1; min-width: 0; }
.fr-name { font-size: 14px; font-weight: 700; line-height: 1.3; }
.fr-meta { display: flex; align-items: center; gap: 6px; margin-top: 3px; }
.fr-number { font-size: 11px; font-weight: 700; color: var(--text-light); }
.fr-cat {
    font-size: 10px; font-weight: 700; text-transform: uppercase; letter-spacing: 0.05em;
    padding: 1px 6px; border-radius: 4px; background: var(--bg-gray); color: var(--text-light);
}
.fr-arrow { font-size: 16px; color: var(--text-light); flex-shrink: 0; }
.no-results { text-align: center; padding: 32px 0; color: var(--text-light); font-size: 14px; }

/* Form layout */
.form-section { margin-bottom: 24px; }
.section-title {
    font-size: 11px; font-weight: 700; text-transform: uppercase;
    letter-spacing: 0.07em; color: var(--text-light);
    margin-bottom: 12px; padding-bottom: 8px; border-bottom: 1px solid var(--border);
}
.field-group { margin-bottom: 14px; }
.field-label { display: block; font-size: 13px; font-weight: 600; margin-bottom: 5px; }
.field-input, .field-select, .field-textarea {
    width: 100%; padding: 9px 12px;
    border: 1.5px solid var(--border); border-radius: 8px;
    font-size: 14px; font-family: inherit;
    background: var(--bg); color: var(--text);
    outline: none; transition: border-color 0.15s;
}
.field-input:focus, .field-select:focus, .field-textarea:focus { border-color: var(--primary); }
.field-textarea { resize: vertical; min-height: 70px; }
.field-row { display: flex; gap: 8px; align-items: center; }
.field-row .field-input { flex: 1; }
.field-suffix { font-size: 13px; color: var(--text-light); white-space: nowrap; }

/* Audit / Risk items */
.audit-item {
    border: 1.5px solid var(--border); border-radius: 10px;
    padding: 12px; margin-bottom: 10px;
    transition: border-color 0.15s, background 0.15s;
}
.audit-item.risk-good    { border-color: var(--risk-good);   background: #f0fdf4; }
.audit-item.risk-low     { border-color: var(--risk-low);    background: #eff6ff; }
.audit-item.risk-medium  { border-color: var(--risk-medium); background: #fffbeb; }
.audit-item.risk-high    { border-color: var(--risk-high);   background: #fef2f2; }
@media (prefers-color-scheme: dark) {
    .audit-item.risk-good   { background: rgba(16,185,129,0.09); }
    .audit-item.risk-low    { background: rgba(59,130,246,0.09); }
    .audit-item.risk-medium { background: rgba(245,158,11,0.09); }
    .audit-item.risk-high   { background: rgba(239,68,68,0.09); }
}
.audit-top { display: flex; align-items: center; gap: 10px; margin-bottom: 8px; }
.audit-label { flex: 1; font-size: 13px; font-weight: 600; line-height: 1.3; }
.audit-indicator {
    width: 26px; height: 26px; border-radius: 5px;
    background: #d1d5db; flex-shrink: 0; transition: background 0.2s;
}
.audit-indicator.ind-good   { background: var(--risk-good); }
.audit-indicator.ind-low    { background: var(--risk-low); }
.audit-indicator.ind-medium { background: var(--risk-medium); }
.audit-indicator.ind-high   { background: var(--risk-high); }
.audit-select {
    padding: 6px 10px; border: 1.5px solid var(--border); border-radius: 6px;
    font-size: 13px; font-family: inherit;
    background: var(--bg); color: var(--text); outline: none;
}
.audit-notes {
    width: 100%; padding: 7px 10px; border: 1.5px solid var(--border);
    border-radius: 6px; font-size: 12px; font-family: inherit;
    background: var(--bg); color: var(--text);
    resize: vertical; min-height: 50px; outline: none;
}

/* Radio / checkbox tables */
.radio-table, .applicable-table {
    width: 100%; border-collapse: collapse; font-size: 13px;
}
.radio-table th, .applicable-table th {
    font-size: 11px; font-weight: 700; color: var(--text-light);
    text-align: center; padding: 6px 4px; border-bottom: 1px solid var(--border);
    white-space: nowrap;
}
.radio-table th:first-child, .applicable-table th:first-child { text-align: left; }
.radio-table td, .applicable-table td {
    padding: 8px 4px; border-bottom: 1px solid var(--border); vertical-align: middle;
}
.radio-table td:not(:first-child), .applicable-table td:not(:first-child) { text-align: center; }
.radio-table tr:last-child td, .applicable-table tr:last-child td { border-bottom: none; }
.radio-table input[type="radio"], .applicable-table input[type="radio"] {
    width: 15px; height: 15px; accent-color: var(--primary); cursor: pointer;
}

/* Checkboxes */
.checkbox-list { display: flex; flex-direction: column; gap: 9px; }
.checkbox-item { display: flex; align-items: flex-start; gap: 9px; font-size: 13px; cursor: pointer; line-height: 1.4; }
.checkbox-item input[type="checkbox"] {
    width: 16px; height: 16px; margin-top: 1px; accent-color: var(--primary); cursor: pointer; flex-shrink: 0;
}

/* Signature pad */
.sig-wrap { border: 1.5px solid var(--border); border-radius: 8px; overflow: hidden; background: var(--bg); }
.sig-canvas { display: block; width: 100%; height: 100px; touch-action: none; cursor: crosshair; }
.sig-footer {
    display: flex; justify-content: space-between; align-items: center;
    padding: 6px 12px; border-top: 1px solid var(--border); background: var(--bg-gray);
}
.sig-hint { font-size: 11px; color: var(--text-light); }
.sig-clear { font-size: 12px; color: var(--danger); background: none; border: none; cursor: pointer; font-family: inherit; padding: 0; }

/* Upload */
.upload-zone {
    border: 2px dashed var(--border); border-radius: 8px; padding: 20px;
    text-align: center; cursor: pointer; transition: border-color 0.15s;
}
.upload-zone:hover { border-color: var(--primary); }
.upload-zone input[type="file"] { display: none; }
.upload-zone-icon { font-size: 24px; margin-bottom: 6px; }
.upload-zone-text { font-size: 13px; color: var(--text-light); }
.upload-filename { font-size: 13px; color: var(--success); margin-top: 6px; font-weight: 600; }

/* Buttons */
.submit-row {
    display: flex; gap: 10px; margin-top: 24px;
    padding-top: 16px; border-top: 1px solid var(--border);
}
.cw-btn {
    flex: 1; padding: 13px; font-size: 15px; border-radius: 10px;
    background: var(--primary); color: white; border: none;
    cursor: pointer; font-weight: 700; font-family: inherit; transition: filter 0.15s;
}
.cw-btn:hover { filter: brightness(0.92); }
.cw-btn-secondary {
    flex: 1; padding: 13px; font-size: 15px; border-radius: 10px;
    background: var(--bg-gray); color: var(--text);
    border: 1.5px solid var(--border); cursor: pointer; font-weight: 600; font-family: inherit;
}
.cw-badge-btn {
    display: inline-flex; align-items: center; gap: 5px;
    padding: 5px 12px; border-radius: 6px; font-size: 12px;
    font-weight: 700; border: none; cursor: pointer; font-family: inherit;
}
.cw-badge-btn.warning { background: var(--warning); color: #fff; }

/* Success */
.success-view { text-align: center; padding: 40px 16px; }
.success-icon { font-size: 56px; margin-bottom: 16px; }
.success-view h2 { font-size: 22px; font-weight: 700; margin-bottom: 8px; }
.success-view p { color: var(--text-light); font-size: 15px; margin-bottom: 24px; }
.success-meta {
    display: inline-flex; flex-direction: column; gap: 6px;
    text-align: left; background: var(--bg-gray);
    border-radius: 10px; padding: 14px 20px; margin-bottom: 28px; font-size: 13px;
}
.success-meta span { color: var(--text-light); }
.success-meta strong { color: var(--text); }

.mt8 { margin-top: 8px; }
.mt12 { margin-top: 12px; }
.overflow-x { overflow-x: auto; }
</style>
</head>
<body>
<div class="widget" id="app"></div>
<script>
// --- i18n ---
const LANG = (() => {
    const l = navigator.language || '';
    if (l.startsWith('de')) return 'de';
    if (l.startsWith('fr')) return 'fr';
    if (l.startsWith('es')) return 'es';
    if (l.startsWith('ja')) return 'ja';
    if (l === 'en-GB') return 'en-GB';
    return 'en-US';
})();
document.documentElement.lang = LANG;
const LOCALE = { 'de':'de-DE','fr':'fr-FR','es':'es-ES','ja':'ja-JP','en-GB':'en-GB','en-US':'en-US' }[LANG];

const TR = {
    de: {
        title:'Sicherheitsformulare', desc:'Sicherheitsformulare ausfüllen und einreichen',
        select:'Formular auswählen', selectSub:'Wählen Sie eine Vorlage aus, um zu beginnen',
        submit:'Einreichen', draft:'Als Entwurf speichern', back:'Zurück',
        clear:'Löschen', upload:'PDF hochladen', chooseFile:'Datei auswählen',
        signHere:'Hier unterschreiben', successTitle:'Formular eingereicht!',
        successMsg:'Das Formular wurde erfolgreich eingereicht.', another:'Weiteres Formular',
        by:'Eingereicht von', form:'Formular', time:'Uhrzeit', project:'Projekt',
    },
    fr: {
        title:'Formulaires de securite', desc:'Remplir et soumettre les formulaires de securite du chantier',
        select:'Choisir un formulaire', selectSub:'Selectionnez un modele pour commencer',
        submit:'Soumettre', draft:'Enregistrer comme brouillon', back:'Retour',
        clear:'Effacer', upload:'Telecharger PDF', chooseFile:'Choisir un fichier',
        signHere:'Signer ici', successTitle:'Formulaire soumis !',
        successMsg:'Le formulaire a ete soumis avec succes.', another:'Autre formulaire',
        by:'Soumis par', form:'Formulaire', time:'Heure', project:'Projet',
    },
    es: {
        title:'Formularios de seguridad', desc:'Complete y envie formularios de seguridad del sitio',
        select:'Seleccionar formulario', selectSub:'Seleccione una plantilla para comenzar',
        submit:'Enviar', draft:'Guardar como borrador', back:'Volver',
        clear:'Borrar', upload:'Subir PDF', chooseFile:'Elegir archivo',
        signHere:'Firmar aqui', successTitle:'Formulario enviado!',
        successMsg:'El formulario se envio correctamente.', another:'Otro formulario',
        by:'Enviado por', form:'Formulario', time:'Hora', project:'Proyecto',
    },
    ja: {
        title:'安全フォーム', desc:'現場安全フォームを記入して送信',
        select:'フォームを選択', selectSub:'テンプレートを選択して開始',
        submit:'送信', draft:'下書きとして保存', back:'戻る',
        clear:'クリア', upload:'PDFをアップロード', chooseFile:'ファイルを選択',
        signHere:'ここに署名', successTitle:'フォームが送信されました！',
        successMsg:'フォームが正常に送信されました。', another:'別のフォームを送信',
        by:'送信者', form:'フォーム', time:'時間', project:'プロジェクト',
    },
    'en-GB': {
        title:'Safety Forms', desc:'Complete and submit site safety forms',
        select:'Select a Form', selectSub:'Choose a template to get started',
        submit:'Submit', draft:'Save as Draft', back:'Back',
        clear:'Clear', upload:'Upload PDF', chooseFile:'Choose File',
        signHere:'Sign here', successTitle:'Form Submitted!',
        successMsg:'Your form has been submitted successfully.', another:'Submit Another Form',
        by:'Submitted by', form:'Form', time:'Time', project:'Project',
    },
    'en-US': {
        title:'Safety Forms', desc:'Complete and submit site safety forms',
        select:'Select a Form', selectSub:'Choose a template to get started',
        submit:'Submit', draft:'Save as Draft', back:'Back',
        clear:'Clear', upload:'Upload PDF', chooseFile:'Choose File',
        signHere:'Sign here', successTitle:'Form Submitted!',
        successMsg:'Your form has been submitted successfully.', another:'Submit Another Form',
        by:'Submitted by', form:'Form', time:'Time', project:'Project',
    },
};
const L = TR[LANG] || TR['en-US'];

// --- SB brand ---
function applySBBrand() {
    var sb = getComputedStyle(document.documentElement).getPropertyValue('--sb-brand').trim();
    if (sb) { document.documentElement.style.setProperty('--primary', sb); return; }
    try {
        sb = window.parent.getComputedStyle(window.parent.document.documentElement).getPropertyValue('--sb-brand').trim();
        if (sb) document.documentElement.style.setProperty('--primary', sb);
    } catch(e){}
}

// --- Constants ---
const PROJECTS = ['Downtown Core - Phase 1','Riverside Complex','Westside Tower','North Campus Building B','Midtown Parkway'];
const WORKERS  = ['Marcus Barlow','Maya Kumar','Thomas Lawrence','Joel Riggs','Elizabeth Rorke','Kelsey Rupowski','Anne Ryder','Fred Duchamp','Henry Fitz'];
const RISK_OPTIONS = ['','N/A','Good','Low Risk','Medium Risk','High Risk'];
const STORAGE_KEY  = 'safety_form_submissions';

// ── FORM CATALOG ────────────────────────────────────────────────────────────
// To add a new form: add an entry here + a buildXxx() function below.
// 'id' must match the key used in openForm() / collectData().
// ────────────────────────────────────────────────────────────────────────────
const FORM_CATALOG = [
    { id:'morning-huddle', number:'1.9',  name:'Hazard Identification',              category:'Safety',   icon:'&#9728;&#65039;' },
    { id:'site-safety',    number:'2.0',  name:'Site Safety Inspection',      category:'Safety',  icon:'&#129462;'       },
    { id:'pre-site',       number:'3.2',  name:'Pre-Site Inspection',         category:'Safety',  icon:'&#128203;'       },
    { id:'concrete-pump',  number:'3.01', name:'PSI &#8211; Concrete Pump Operator', category:'PSI', icon:'&#127959;&#65039;' },
    // Future forms — uncomment and add a builder function to enable:
    // { id:'tower-crane',  number:'6.2',  name:'Tower Crane Inspection Log',  category:'Safety',  icon:'&#129354;' },
    // { id:'boom-lift',    number:'2.5',  name:'Boom Lift Daily Inspection',  category:'Safety',  icon:'&#128736;' },
    // { id:'scissor-lift', number:'2.8',  name:'Scissor Lift Inspection',     category:'Safety',  icon:'&#128295;' },
    // { id:'orientation',  number:'1.8',  name:'Site Specific Orientation',   category:'HR',      icon:'&#128101;' },
];

// Lookup used by openForm() and collectData()
const FORM_META = Object.fromEntries(
    FORM_CATALOG.map(f => [f.id, { number: f.number, name: f.name.replace(/&#8211;/g, '–') }])
);

// --- Helpers ---
const now = new Date();
const daysAgo = n => { const d = new Date(now); d.setDate(d.getDate() - n); return d; };

function fmtDate(iso) {
    return new Intl.DateTimeFormat(LOCALE, { dateStyle:'medium', timeStyle:'short' }).format(new Date(iso));
}
function dateNow() {
    return now.toISOString().slice(0,16);
}
function getRiskClass(v) {
    if (v === 'Good') return 'risk-good';
    if (v === 'Low Risk') return 'risk-low';
    if (v === 'Medium Risk') return 'risk-medium';
    if (v === 'High Risk') return 'risk-high';
    return '';
}
function getIndClass(v) {
    if (v === 'Good') return 'ind-good';
    if (v === 'Low Risk') return 'ind-low';
    if (v === 'Medium Risk') return 'ind-medium';
    if (v === 'High Risk') return 'ind-high';
    return '';
}
function projectOpts() {
    return PROJECTS.map(p => `<option value="${p}">${p}</option>`).join('');
}
function workerOpts() {
    return WORKERS.map(w => `<option value="${w}">${w}</option>`).join('');
}

// --- State ---
let currentFormId = null;
let lastSubmission = null;

// --- Views ---
var _homeQuery = '';
var _homeCat   = 'All';

function renderHome() {
    var cats = ['All', ...new Set(FORM_CATALOG.map(f => f.category))];
    var pillsHTML = cats.map(c => {
        var active = c === _homeCat ? ' active' : '';
        return `<button class="cat-pill${active}" onclick="setCat('${c}')">${c}</button>`;
    }).join('');

    document.getElementById('app').innerHTML = `
    <h2 class="home-title">${L.select}</h2>
    <div class="search-wrap">
      <span class="search-icon">&#128269;</span>
      <input class="search-input" type="search" placeholder="Search forms&#8230;"
             value="${_homeQuery.replace(/"/g, '&quot;')}"
             oninput="setQuery(this.value)">
    </div>
    <div class="cat-pills">${pillsHTML}</div>
    <div class="form-list" id="form-list"></div>`;

    renderFormList();
}

function renderFormList() {
    var q = _homeQuery.toLowerCase().trim();
    var filtered = FORM_CATALOG.filter(f => {
        var matchCat = _homeCat === 'All' || f.category === _homeCat;
        var matchQ   = !q || f.name.toLowerCase().includes(q) || f.category.toLowerCase().includes(q) || f.number.includes(q);
        return matchCat && matchQ;
    });

    var list = document.getElementById('form-list');
    if (!list) return;
    if (filtered.length === 0) {
        list.innerHTML = `<div class="no-results">No forms match &#8220;${_homeQuery}&#8221;</div>`;
        return;
    }
    list.innerHTML = filtered.map(f => `
    <div class="form-row" onclick="openForm('${f.id}')">
      <div class="fr-icon">${f.icon}</div>
      <div class="fr-body">
        <div class="fr-name">${f.name}</div>
        <div class="fr-meta">
          <span class="fr-number">${f.number}</span>
          <span class="fr-cat">${f.category}</span>
        </div>
      </div>
      <div class="fr-arrow">&#8250;</div>
    </div>`).join('');
}

function setQuery(val) { _homeQuery = val; renderFormList(); }
function setCat(cat)   { _homeCat = cat; renderHome(); }

function renderSuccess() {
    const s = lastSubmission;
    document.getElementById('app').innerHTML = `
    <div class="success-view">
      <div class="success-icon">&#9989;</div>
      <h2>${L.successTitle}</h2>
      <p>${L.successMsg}</p>
      <div class="success-meta">
        <div><span>${L.form}: </span><strong>${s.formName}</strong></div>
        <div><span>${L.by}: </span><strong>${s.worker}</strong></div>
        <div><span>${L.project}: </span><strong>${s.project || '—'}</strong></div>
        <div><span>${L.time}: </span><strong>${fmtDate(s.submittedAt)}</strong></div>
      </div>
      <button class="cw-btn" style="max-width:280px" onclick="renderHome()">${L.another}</button>
    </div>`;
}

// ============================================================
// FORM: Morning Huddle (1.9)
// ============================================================
function buildMorningHuddle() {
    return `<form id="form-data" onsubmit="return false">
      <div class="form-section">
        <div class="section-title">Job Details</div>
        <div class="field-group"><label class="field-label">Submitted By</label><select class="field-input" name="worker">${workerOpts()}</select></div>
        <div class="field-group"><label class="field-label">Project</label><select class="field-input" name="project"><option value="">Select project&#8230;</option>${projectOpts()}</select></div>
        <div class="field-group"><label class="field-label">Date / Time</label><input type="datetime-local" class="field-input" name="datetime" value="${dateNow()}"></div>
        <div class="field-group"><label class="field-label">Weather Conditions / Temperature (Today and Tomorrow)</label><input type="text" class="field-input" name="weather" placeholder="e.g. Clear, 12&#176;C / Scattered cloud tomorrow"></div>
      </div>
      <div class="form-section">
        <div class="section-title">Daily Briefing</div>

// ============================================================
// Signature pad
// ============================================================
var sigCtx = null, sigDrawing = false;
function getPos(e, canvas) {
    var r = canvas.getBoundingClientRect();
    var sx = canvas.width / r.width, sy = canvas.height / r.height;
    var cx = (e.clientX !== undefined ? e.clientX : e.touches[0].clientX);
    var cy = (e.clientY !== undefined ? e.clientY : e.touches[0].clientY);
    return [(cx - r.left) * sx, (cy - r.top) * sy];
}
function initSigPad(canvas) {
    sigCtx = canvas.getContext('2d');
    sigCtx.strokeStyle = getComputedStyle(document.documentElement).getPropertyValue('--text').trim() || '#1f2937';
    sigCtx.lineWidth = 2; sigCtx.lineCap = 'round'; sigCtx.lineJoin = 'round';
    canvas.addEventListener('mousedown',  function(e){ sigDrawing=true; sigCtx.beginPath(); sigCtx.moveTo.apply(sigCtx,getPos(e,canvas)); });
    canvas.addEventListener('mousemove',  function(e){ if(!sigDrawing)return; sigCtx.lineTo.apply(sigCtx,getPos(e,canvas)); sigCtx.stroke(); });
    canvas.addEventListener('mouseup',    function(){ sigDrawing=false; });
    canvas.addEventListener('mouseleave', function(){ sigDrawing=false; });
    canvas.addEventListener('touchstart', function(e){ e.preventDefault(); sigDrawing=true; sigCtx.beginPath(); sigCtx.moveTo.apply(sigCtx,getPos(e,canvas)); }, {passive:false});
    canvas.addEventListener('touchmove',  function(e){ e.preventDefault(); if(!sigDrawing)return; sigCtx.lineTo.apply(sigCtx,getPos(e,canvas)); sigCtx.stroke(); }, {passive:false});
    canvas.addEventListener('touchend',   function(){ sigDrawing=false; });
}
function clearSig() { if(sigCtx) sigCtx.clearRect(0,0,sigCtx.canvas.width,sigCtx.canvas.height); }

function captureFormSnapshot() {
    var form = document.getElementById('form-data');
    if (!form) return null;
    // Serialize JS-set values into HTML attributes so cloneNode captures them
    form.querySelectorAll('input[type="text"],input[type="number"],input[type="date"],input[type="datetime-local"]').forEach(function(el) {
        el.setAttribute('value', el.value);
    });
    form.querySelectorAll('textarea').forEach(function(el) {
        el.textContent = el.value;
    });
    form.querySelectorAll('select').forEach(function(sel) {
        Array.from(sel.options).forEach(function(opt) {
            opt.value === sel.value ? opt.setAttribute('selected','') : opt.removeAttribute('selected');
        });
    });
    form.querySelectorAll('input[type="checkbox"],input[type="radio"]').forEach(function(el) {
        el.checked ? el.setAttribute('checked','') : el.removeAttribute('checked');
    });
    var clone = form.cloneNode(true);
    // Replace each canvas with a static img (preserves signature drawing)
    var canvases = form.querySelectorAll('canvas');
    clone.querySelectorAll('canvas').forEach(function(c, i) {
        var img = document.createElement('img');
        img.src = canvases[i] ? canvases[i].toDataURL('image/png') : '';
        img.className = 'sig-canvas';
        c.parentNode.replaceChild(img, c);
    });
    // Strip interactive/upload elements that don't print meaningfully
    clone.querySelectorAll('.submit-row, .sig-footer button, input[type="file"], .upload-zone-icon, .upload-zone-text').forEach(function(el){ el.remove(); });
    return clone.outerHTML;
}

function collectData(status) {
    var form = document.getElementById('form-data');
    if (!form) return null;
    var fd = new FormData(form), data = {};
    for (var pair of fd.entries()) data[pair[0]] = pair[1];
    return {
        id: Date.now(),
        formId: currentFormId,
        formName: FORM_META[currentFormId].name,
        formNumber: FORM_META[currentFormId].number,
        worker: data.worker || data.operator || WORKERS[0],
        project: data.project || '',
        submittedAt: new Date().toISOString(),
        status: status,
        flag: null,
        data: data,
        renderedHtml: captureFormSnapshot(),
    };
}
function persist(sub) {
    var arr = JSON.parse(localStorage.getItem(STORAGE_KEY) || '[]');
    arr.unshift(sub);
    localStorage.setItem(STORAGE_KEY, JSON.stringify(arr));
}
function submitForm() {
    var sub = collectData('Complete');
    if (!sub) return;
    persist(sub); lastSubmission = sub; renderSuccess();
}
function saveDraft() {
    var sub = collectData('Draft');
    if (!sub) return;
    persist(sub); lastSubmission = sub; renderSuccess();
}
